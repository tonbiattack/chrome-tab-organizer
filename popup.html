<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Organizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
      color: #333;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .tab-count {
      font-size: 12px;
      opacity: 0.8;
      margin-left: auto;
    }

    .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, transform 0.1s;
      text-align: left;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #10b981;
      color: white;
    }

    .btn-secondary:hover {
      background: #059669;
    }

    .btn-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .btn-desc {
      font-size: 11px;
      opacity: 0.85;
      font-weight: 400;
      display: block;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 4px 0;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .group-rules {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .group-rules h2 {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .rule-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rule-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #4b5563;
    }

    .rule-label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
      cursor: pointer;
    }

    .rule-label input[type="checkbox"] {
      accent-color: #2563eb;
      width: 14px;
      height: 14px;
      cursor: pointer;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .rule-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .rule-name {
      font-weight: 600;
      color: #374151;
    }

    .rule-patterns {
      font-size: 11px;
      color: #6b7280;
      word-break: break-word;
    }

    .section-desc {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .custom-rule-item {
      justify-content: space-between;
      align-items: flex-start;
    }

    .rule-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .rule-edit {
      border: none;
      background: #dbeafe;
      color: #1e40af;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .rule-edit:hover {
      background: #bfdbfe;
    }

    .rule-delete {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .rule-delete:hover {
      background: #fecaca;
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-field label {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
      color: #111827;
    }

    .form-field textarea {
      resize: vertical;
      min-height: 72px;
    }

    .field-help {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
    }

    .inline-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn-tertiary {
      background: #111827;
      color: white;
      justify-content: center;
    }

    .btn-tertiary:hover {
      background: #1f2937;
    }

    .btn-ghost {
      background: #eef2ff;
      color: #3730a3;
      justify-content: center;
      padding: 8px 10px;
      font-size: 12px;
    }

    .btn-ghost:hover {
      background: #e0e7ff;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .empty-state {
      font-size: 12px;
      color: #6b7280;
      padding: 6px 0;
    }

    .rule-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .window-scope {
      padding: 6px 16px;
      background: #eef2ff;
      border-bottom: 1px solid #e0e7ff;
      font-size: 12px;
    }

    .scope-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: #4338ca;
      user-select: none;
    }

    .scope-label input[type="checkbox"] {
      accent-color: #2563eb;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <span>📑</span>
    <h1>Tab Organizer</h1>
    <span class="tab-count" id="tabCount">読み込み中...</span>
  </header>

  <div class="window-scope">
    <label class="scope-label">
      <input type="checkbox" id="allWindows">
      <span>全ウィンドウを対象にする</span>
    </label>
  </div>

  <div class="content">
    <button class="btn btn-primary" id="btnDedup">
      <span class="btn-icon">🔍</span>
      <span>
        重複タブを削除
        <span class="btn-desc">同じURLのタブを1つだけ残す</span>
      </span>
    </button>

    <button class="btn btn-secondary" id="btnSort">
      <span class="btn-icon">📂</span>
      <span>
        ドメインごとに整理
        <span class="btn-desc">サービス別にタブをグループ化・並び替え</span>
      </span>
    </button>

    <label class="scope-label" style="padding: 0 2px;">
      <input type="checkbox" id="collapseGroups">
      <span>整理後にグループを折りたたむ</span>
    </label>

    <button class="btn btn-danger" id="btnUngroupAll">
      <span class="btn-icon">🗑️</span>
      <span>
        グループをすべて解除
        <span class="btn-desc">すべてのタブグループを解除する</span>
      </span>
    </button>

    <div class="divider"></div>

    <div id="status" class="status"></div>

    <div class="group-rules">
      <h2>標準ルール</h2>
      <div class="inline-actions" style="margin-bottom: 6px;">
        <button class="btn btn-ghost" id="btnCheckAll" type="button">すべて選択</button>
        <button class="btn btn-ghost" id="btnUncheckAll" type="button">すべて解除</button>
      </div>
      <div class="rule-list" id="ruleList"></div>
    </div>

    <div class="group-rules">
      <h2>カスタムルール</h2>
      <p class="section-desc">Jira課題キーをまとめて、親課題名やエピック名など任意の名前でグループ化できます。</p>
      <div class="rule-list" id="customRuleList"></div>
    </div>

    <div class="group-rules">
      <h2 id="formTitle">ルール追加</h2>
      <form id="customRuleForm" class="form-grid">
        <div class="form-field">
          <label for="customRuleName">グループ名</label>
          <input id="customRuleName" type="text" placeholder="例: 親課題A / Sprint 42" required>
        </div>

        <div class="form-field">
          <label for="customRuleColor">グループ色</label>
          <select id="customRuleColor">
            <option value="blue">blue</option>
            <option value="cyan">cyan</option>
            <option value="green">green</option>
            <option value="grey">grey</option>
            <option value="orange">orange</option>
            <option value="pink">pink</option>
            <option value="purple">purple</option>
            <option value="red">red</option>
            <option value="yellow">yellow</option>
          </select>
        </div>

        <div class="form-field">
          <label for="customRuleType">ルール種別</label>
          <select id="customRuleType">
            <option value="jira-keys">Jira課題キー</option>
            <option value="url-pattern">URLパターン</option>
          </select>
        </div>

        <div class="form-field" id="customJiraFields">
          <label for="customRuleKeys">Jira課題キー</label>
          <textarea id="customRuleKeys" placeholder="PROJ-101, PROJ-102"></textarea>
          <div class="field-help">カンマ区切りまたは改行区切り。親子課題をまとめたいときは、同じ親に属する課題キーを並べてください。</div>
          <div class="inline-actions">
            <button class="btn btn-ghost" id="fillJiraKeys" type="button">現在のJiraタブから取得</button>
          </div>
        </div>

        <div class="form-field" id="customPatternFields" hidden>
          <label for="customRulePatterns">URLパターン</label>
          <textarea id="customRulePatterns" placeholder="figma\.com&#10;miro\.com"></textarea>
          <div class="field-help">正規表現を改行またはカンマ区切りで入力します。大文字小文字は区別しません。</div>
        </div>

        <button class="btn btn-tertiary" id="customRuleSubmit" type="submit">カスタムルールを追加</button>
        <button class="btn btn-ghost" id="cancelRuleEdit" type="button" hidden>キャンセル</button>
      </form>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
