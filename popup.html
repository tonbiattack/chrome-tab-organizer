<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Organizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
      color: #333;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .tab-count {
      font-size: 12px;
      opacity: 0.8;
      margin-left: auto;
    }

    .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, transform 0.1s;
      text-align: left;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #10b981;
      color: white;
    }

    .btn-secondary:hover {
      background: #059669;
    }

    .btn-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .btn-desc {
      font-size: 11px;
      opacity: 0.85;
      font-weight: 400;
      display: block;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 4px 0;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .group-rules {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .group-rules h2 {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .rule-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .rule-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4b5563;
    }

    .rule-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .window-scope {
      padding: 6px 16px;
      background: #eef2ff;
      border-bottom: 1px solid #e0e7ff;
      font-size: 12px;
    }

    .scope-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: #4338ca;
      user-select: none;
    }

    .scope-label input[type="checkbox"] {
      accent-color: #2563eb;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .max-windows-row {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .max-windows-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: #4338ca;
      user-select: none;
      font-size: 12px;
    }

    .max-windows-label input[type="checkbox"] {
      accent-color: #2563eb;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .max-windows-input {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #4338ca;
      padding-left: 20px;
    }

    .max-windows-input input[type="number"] {
      width: 48px;
      padding: 2px 4px;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      color: #1e1b4b;
    }
  </style>
</head>
<body>
  <header>
    <span>📑</span>
    <h1>Tab Organizer</h1>
    <span class="tab-count" id="tabCount">読み込み中...</span>
  </header>

  <div class="window-scope">
    <label class="scope-label">
      <input type="checkbox" id="allWindows">
      <span>全ウィンドウを対象にする</span>
    </label>
    <div class="max-windows-row" id="maxWindowsRow" style="display:none;">
      <label class="max-windows-label">
        <input type="checkbox" id="enableMaxWindows">
        <span>ウィンドウ数を制限する</span>
      </label>
      <div class="max-windows-input" id="maxWindowsInput" style="display:none;">
        <span>最大</span>
        <input type="number" id="maxWindowsCount" min="1" max="99" value="1">
        <span>ウィンドウ</span>
      </div>
    </div>
  </div>

  <div class="content">
    <button class="btn btn-primary" id="btnDedup">
      <span class="btn-icon">🔍</span>
      <span>
        重複タブを削除
        <span class="btn-desc">同じURLのタブを1つだけ残す</span>
      </span>
    </button>

    <button class="btn btn-secondary" id="btnSort">
      <span class="btn-icon">📂</span>
      <span>
        ドメインごとに整理
        <span class="btn-desc">サービス別にタブをグループ化・並び替え</span>
      </span>
    </button>

    <div class="divider"></div>

    <div id="status" class="status"></div>

    <div class="group-rules">
      <h2>グループルール</h2>
      <div class="rule-list" id="ruleList"></div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
